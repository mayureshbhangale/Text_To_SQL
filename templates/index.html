<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NL-to-SQL Evaluator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3148;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    header h1 { font-size: 18px; font-weight: 600; color: #a78bfa; }
    header span { font-size: 13px; color: #64748b; }
    #model-badge {
      margin-left: auto;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      color: #94a3b8;
    }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px; min-width: 280px;
      background: #141720;
      border-right: 1px solid #1e2235;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-top { padding: 16px; border-bottom: 1px solid #1e2235; flex-shrink: 0; }
    .sidebar-top label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing:.05em; display:block; margin-bottom:6px; }
    select {
      width: 100%; background: #1e2235; border: 1px solid #2d3557;
      color: #e2e8f0; padding: 8px 10px; border-radius: 6px; font-size: 13px; cursor: pointer;
    }
    select:focus { outline: none; border-color: #7c3aed; }
    .question-count { font-size: 11px; color: #475569; margin-top: 8px; }
    .question-list { overflow-y: auto; flex: 1; padding: 8px 0; }
    .question-list::-webkit-scrollbar { width: 4px; }
    .question-list::-webkit-scrollbar-thumb { background: #2d3557; border-radius: 4px; }
    .q-item {
      padding: 10px 16px; cursor: pointer;
      border-left: 3px solid transparent;
      font-size: 13px; color: #94a3b8; line-height: 1.4; transition: all .15s;
    }
    .q-item:hover { background: #1a1f35; color: #e2e8f0; }
    .q-item.active { background: #1e2540; border-left-color: #7c3aed; color: #e2e8f0; }
    .q-item .q-num { font-size: 10px; color: #475569; margin-bottom: 3px; }

    /* ── Tabs ── */
    .tab-bar {
      display: flex; gap: 2px; padding: 12px 24px 0;
      border-bottom: 1px solid #1e2235; flex-shrink: 0;
      background: #0f1117;
    }
    .tab-btn {
      padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
      border: none; background: none; color: #64748b;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color .15s, border-color .15s;
    }
    .tab-btn:hover { color: #94a3b8; }
    .tab-btn.active { color: #a78bfa; border-bottom-color: #7c3aed; }

    .tab-content { display: none; flex: 1; overflow: hidden; }
    .tab-content.active { display: flex; }

    /* ── Main ── */
    .main { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
    .main::-webkit-scrollbar { width: 6px; }
    .main::-webkit-scrollbar-thumb { background: #2d3557; border-radius: 4px; }

    /* ── Custom query tab ── */
    .custom-wrap { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .custom-wrap::-webkit-scrollbar { width: 6px; }
    .custom-wrap::-webkit-scrollbar-thumb { background: #2d3557; border-radius: 4px; }

    .custom-form {
      background: #141720; border: 1px solid #1e2235; border-radius: 10px; padding: 20px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .custom-form label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing:.05em; display:block; margin-bottom:5px; }
    .custom-form select { width: 100%; }
    textarea {
      width: 100%; background: #1e2235; border: 1px solid #2d3557;
      color: #e2e8f0; padding: 10px 12px; border-radius: 6px;
      font-size: 14px; font-family: inherit; resize: vertical;
      min-height: 80px; line-height: 1.5;
    }
    textarea:focus { outline: none; border-color: #7c3aed; }
    textarea::placeholder { color: #475569; }
    .custom-run-row { display: flex; justify-content: flex-end; }

    .custom-sql-panel {
      background: #141720; border: 1px solid #1e2235; border-radius: 10px; overflow: hidden;
    }
    .custom-sql-header {
      padding: 10px 16px; border-bottom: 1px solid #1e2235;
      font-size: 11px; font-weight: 700; color: #818cf8;
      text-transform: uppercase; letter-spacing:.06em;
      display: flex; align-items: center; gap: 8px;
    }

    .empty-state {
      flex: 1; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px; color: #334155;
    }
    .empty-state .icon { font-size: 48px; }

    /* ── Question card ── */
    .question-card {
      background: #141720; border: 1px solid #1e2235; border-radius: 10px;
      padding: 16px 20px; display: flex; align-items: flex-start; gap: 14px;
    }
    .q-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing:.06em; flex-shrink:0; margin-top:3px; }
    .q-text { font-size: 15px; color: #f1f5f9; font-weight: 500; line-height: 1.5; flex: 1; }
    .run-btn {
      flex-shrink: 0; background: #7c3aed; color: #fff; border: none;
      padding: 9px 18px; border-radius: 7px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background .15s; white-space: nowrap;
    }
    .run-btn:hover { background: #6d28d9; }
    .run-btn:disabled { background: #312e81; color: #818cf8; cursor: not-allowed; }

    /* ── Pipeline steps ── */
    .steps-panel {
      background: #141720; border: 1px solid #1e2235; border-radius: 10px;
    }
    .steps-header {
      padding: 11px 16px; border-bottom: 1px solid #1e2235;
      font-size: 11px; font-weight: 700; color: #64748b;
      text-transform: uppercase; letter-spacing: .07em;
      border-radius: 10px 10px 0 0;
    }
    .step {
      border-bottom: 1px solid #1a1f35;
    }
    .step:last-child { border-bottom: none; }
    .step-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: pointer; transition: background .12s;
      user-select: none;
    }
    .step-header:hover { background: #1a1f35; }
    .step-icon {
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .step-icon.pass  { background: #064e3b; color: #34d399; }
    .step-icon.fail  { background: #450a0a; color: #f87171; }
    .step-icon.idle  { background: #1e293b; color: #475569; }
    .step-icon.running { background: #1e1b4b; color: #818cf8; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .step-label { flex: 1; font-size: 13px; color: #cbd5e1; font-weight: 500; }
    .step-ms { font-size: 11px; color: #475569; font-family: monospace; }
    .step-summary { font-size: 11px; color: #64748b; margin-left: auto; margin-right: 8px; }
    .step-arrow { font-size: 11px; color: #334155; transition: transform .2s; }
    .step.open .step-arrow { transform: rotate(90deg); }

    .step-body {
      display: none; border-top: 1px solid #1a1f35;
      background: #0f1117; padding: 0;
      overflow: hidden;
    }
    .step.open .step-body { display: block; }

    .io-section {
      padding: 12px 16px;
      border-bottom: 1px solid #1a1f35;
    }
    .io-section:last-child { border-bottom: none; }

    .io-label {
      font-size: 10px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .io-label.input  { color: #60a5fa; }
    .io-label.output { color: #34d399; }
    .io-label::after { content:''; flex:1; height:1px; background: currentColor; opacity:.2; }

    .io-block {
      background: #0a0c14; border: 1px solid #1e2235; border-radius: 6px;
      overflow-y: auto; max-height: 320px;
    }
    .io-block::-webkit-scrollbar { width: 4px; }
    .io-block::-webkit-scrollbar-thumb { background: #2d3557; border-radius: 4px; }

    pre.io-pre {
      padding: 12px 14px;
      font-family: "SF Mono","Fira Code",monospace;
      font-size: 12px; line-height: 1.6; color: #e2e8f0;
      white-space: pre-wrap; word-break: break-all; margin: 0;
    }

    /* content inside step bodies */
    .kv-grid { display: grid; grid-template-columns: max-content 1fr; gap: 6px 16px; font-size: 12px; }
    .kv-key { color: #64748b; white-space: nowrap; padding-top: 1px; }
    .kv-val { color: #94a3b8; font-family: monospace; word-break: break-all; }

    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      background: #1e2235; border: 1px solid #2d3557;
      border-radius: 4px; padding: 2px 8px;
      font-size: 11px; color: #94a3b8; font-family: monospace;
    }

    pre.block {
      background: #0a0c14; border: 1px solid #1e2235; border-radius: 6px;
      padding: 12px; font-family: "SF Mono","Fira Code",monospace;
      font-size: 12px; line-height: 1.6; color: #e2e8f0;
      white-space: pre-wrap; word-break: break-all;
      max-height: 300px; overflow-y: auto;
    }
    pre.block::-webkit-scrollbar { width: 4px; }
    pre.block::-webkit-scrollbar-thumb { background: #2d3557; }

    .sub-label {
      font-size: 10px; color: #475569; text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: 6px; margin-top: 12px;
    }
    .sub-label:first-child { margin-top: 0; }

    .highlight-box {
      background: #1a1f35; border-left: 3px solid #7c3aed;
      border-radius: 0 6px 6px 0; padding: 10px 14px;
      font-family: monospace; font-size: 12.5px; color: #e2e8f0;
      white-space: pre-wrap; word-break: break-all;
    }

    /* table inside step */
    .schema-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .schema-table th { background: #141720; padding: 6px 10px; text-align: left; color: #64748b; font-weight:600; }
    .schema-table td { padding: 5px 10px; color: #94a3b8; border-bottom: 1px solid #141720; font-family: monospace; }

    /* ── SQL comparison ── */
    .sql-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .sql-panel { background: #141720; border: 1px solid #1e2235; border-radius: 10px; overflow: hidden; }
    .sql-panel-header {
      padding: 10px 16px; border-bottom: 1px solid #1e2235;
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing:.06em;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .panel-generated .sql-panel-header { color: #818cf8; }
    .panel-generated .dot { background: #818cf8; }
    .panel-gold .sql-panel-header { color: #34d399; }
    .panel-gold .dot { background: #34d399; }
    pre.sql-code {
      padding: 14px 16px; font-family: "SF Mono","Fira Code",monospace;
      font-size: 12.5px; line-height: 1.6; color: #e2e8f0;
      white-space: pre-wrap; word-break: break-all; min-height: 56px;
    }
    pre.sql-code.placeholder { color: #334155; font-style: italic; }

    /* ── Match badges ── */
    .match-row { display: flex; gap: 10px; align-items: center; }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
    }
    .badge-pass   { background: #064e3b; color: #34d399; border: 1px solid #065f46; }
    .badge-fail   { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }
    .badge-neutral{ background: #1e293b; color: #64748b; border: 1px solid #334155; }

    /* ── Results ── */
    .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .results-panel { background: #141720; border: 1px solid #1e2235; border-radius: 10px; overflow: hidden; }
    .results-panel-header { padding: 10px 16px; border-bottom: 1px solid #1e2235; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing:.06em; }
    .results-table-wrap { overflow-x: auto; max-height: 200px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    th { background: #1a1f35; padding: 7px 12px; text-align: left; color: #64748b; font-weight:600; position:sticky; top:0; white-space:nowrap; }
    td { padding: 6px 12px; color: #94a3b8; border-bottom: 1px solid #1a1f35; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1a1f35; }
    .no-rows { padding: 14px 16px; color: #475569; font-size: 13px; font-style: italic; }
    .error-msg { padding: 12px 16px; color: #f87171; font-size: 12px; font-family: monospace; }

    /* ── Trace bar ── */
    .trace-bar {
      background: #141720; border: 1px solid #1e2235; border-radius: 10px;
      padding: 12px 18px; display: flex; gap: 20px; flex-wrap: wrap; align-items: center;
    }
    .trace-item { font-size: 12px; color: #64748b; }
    .trace-item span { color: #94a3b8; font-family: monospace; }

    /* ── Loading ── */
    .loading-overlay {
      display: none; position: fixed; inset: 0; background: rgba(15,17,23,.75);
      z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
    }
    .loading-overlay.active { display: flex; }
    .spinner { width: 40px; height: 40px; border: 3px solid #2d3557; border-top-color: #7c3aed; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #94a3b8; font-size: 14px; }
  </style>
</head>
<body>

<header>
  <h1>NL-to-SQL Evaluator</h1>
  <span>Spider Benchmark</span>
  <div id="model-badge">loading…</div>
</header>

<!-- Tab bar -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('benchmark', this)">Benchmark</button>
  <button class="tab-btn" onclick="switchTab('custom', this)">Custom Query</button>
</div>

<!-- Benchmark tab -->
<div class="tab-content active" id="tab-benchmark">
  <aside class="sidebar">
    <div class="sidebar-top">
      <label>Database</label>
      <select id="db-select"><option value="">Select a database…</option></select>
      <div class="question-count" id="q-count"></div>
    </div>
    <div class="question-list" id="question-list"></div>
  </aside>
  <main class="main" id="main">
    <div class="empty-state">
      <div class="icon">🗄️</div>
      <p>Select a database and pick a question to get started</p>
    </div>
  </main>
</div>

<!-- Custom Query tab -->
<div class="tab-content" id="tab-custom">
  <div class="custom-wrap">

    <div class="custom-form">
      <div>
        <label>Database</label>
        <select id="custom-db-select"><option value="">Select a database…</option></select>
      </div>
      <div>
        <label>Your Question</label>
        <textarea id="custom-question" placeholder="e.g. How many singers are from France?" rows="3"></textarea>
      </div>
      <div class="custom-run-row">
        <button class="run-btn" id="custom-run-btn" onclick="runCustom()">▶ Run Pipeline</button>
      </div>
    </div>

    <div id="custom-steps-panel" style="display:none">
      <div class="steps-panel">
        <div class="steps-header">Pipeline Steps</div>
        <div id="custom-steps-body"></div>
      </div>
    </div>

    <div id="custom-sql-section" style="display:none">
      <div class="custom-sql-panel">
        <div class="custom-sql-header"><div class="dot"></div>Generated SQL</div>
        <pre class="sql-code" id="custom-gen-sql"></pre>
      </div>
    </div>

    <div id="custom-results-section" style="display:none">
      <div class="results-panel">
        <div class="results-panel-header">Query Results</div>
        <div id="custom-results"></div>
      </div>
    </div>

    <div class="trace-bar" id="custom-trace-bar" style="display:none"></div>

  </div>
</div>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Running pipeline…</div>
</div>

<script>
const dbSelect   = document.getElementById('db-select');
const qList      = document.getElementById('question-list');
const qCount     = document.getElementById('q-count');
const main       = document.getElementById('main');
const loading    = document.getElementById('loading');
const modelBadge = document.getElementById('model-badge');
const customDbSelect = document.getElementById('custom-db-select');

let questions = [];
let activeIdx = null;

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
fetch('/api/databases').then(r => r.json()).then(dbs => {
  dbs.forEach(db => {
    const opt1 = document.createElement('option');
    opt1.value = db; opt1.textContent = db;
    dbSelect.appendChild(opt1);

    const opt2 = document.createElement('option');
    opt2.value = db; opt2.textContent = db;
    customDbSelect.appendChild(opt2);
  });
});

dbSelect.addEventListener('change', async () => {
  const db = dbSelect.value;
  if (!db) return;
  questions = await fetch(`/api/questions?db=${db}`).then(r => r.json());
  qCount.textContent = `${questions.length} questions`;
  activeIdx = null;
  renderSidebar();
  main.innerHTML = `<div class="empty-state"><div class="icon">💬</div><p>Select a question from the list</p></div>`;
});

function renderSidebar() {
  qList.innerHTML = '';
  questions.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'q-item' + (i === activeIdx ? ' active' : '');
    div.innerHTML = `<div class="q-num">#${i+1}</div>${esc(q.question)}`;
    div.addEventListener('click', () => { activeIdx = i; renderSidebar(); showQuestion(questions[i]); });
    qList.appendChild(div);
  });
}

// ── Question view ─────────────────────────────────────────────────────────────
function showQuestion(q) {
  main.innerHTML = `
    <div class="question-card">
      <div class="q-label">Question</div>
      <div class="q-text">${esc(q.question)}</div>
      <button class="run-btn" id="run-btn">▶ Run Pipeline</button>
    </div>

    <div class="steps-panel" id="steps-panel">
      <div class="steps-header">Pipeline Steps</div>
      ${idleSteps()}
    </div>

    <div class="sql-grid">
      <div class="sql-panel panel-generated">
        <div class="sql-panel-header"><div class="dot"></div>Generated SQL</div>
        <pre class="sql-code placeholder" id="gen-sql">Run the pipeline to generate SQL…</pre>
      </div>
      <div class="sql-panel panel-gold">
        <div class="sql-panel-header"><div class="dot"></div>Gold SQL (benchmark)</div>
        <pre class="sql-code" id="gold-sql">${esc(q.gold_sql)}</pre>
      </div>
    </div>

    <div class="match-row" id="match-row" style="display:none">
      <div id="exec-badge" class="badge badge-neutral">—</div>
      <div id="exact-badge" class="badge badge-neutral">—</div>
    </div>

    <div class="results-grid" id="results-grid" style="display:none">
      <div class="results-panel">
        <div class="results-panel-header">Generated — Query Results</div>
        <div id="gen-results"></div>
      </div>
      <div class="results-panel">
        <div class="results-panel-header">Gold — Query Results</div>
        <div id="gold-results"></div>
      </div>
    </div>

    <div class="trace-bar" id="trace-bar" style="display:none"></div>
  `;

  document.getElementById('run-btn').addEventListener('click', () => runPipeline(q));
}

function idleSteps() {
  const nodes = [
    ['t1','T1 · Schema Introspector'],['t2','T2 · Schema Normalizer'],
    ['t4','T4 · Join Graph Builder'], ['t5','T5 · Prompt Builder'],
    ['a1','A1 · SQL Composer (LLM)'],['t6','T6 · Guardrails'],
    ['t7','T7 · SQL Validator'],
  ];
  return nodes.map(([id, label]) => `
    <div class="step" id="step-${id}">
      <div class="step-header">
        <div class="step-icon idle">·</div>
        <div class="step-label">${label}</div>
        <div class="step-ms" id="ms-${id}"></div>
      </div>
    </div>`).join('');
}

// ── Run pipeline ──────────────────────────────────────────────────────────────
async function runPipeline(q) {
  const btn = document.getElementById('run-btn');
  btn.disabled = true; btn.textContent = '⏳ Running…';
  loading.classList.add('active');
  document.getElementById('loading-text').textContent = 'Running pipeline…';

  try {
    const resp = await fetch('/api/run', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({db_id: dbSelect.value, question: q.question, gold_sql: q.gold_sql}),
    });
    const data = await resp.json();
    if (data.error && !data.steps) {
      alert('Pipeline error: ' + data.error);
      return;
    }

    modelBadge.textContent = data.model || '—';

    // Render each step
    renderSteps(data.steps || []);

    // SQL panels
    const genEl = document.getElementById('gen-sql');
    genEl.textContent = data.generated_sql || '(no SQL generated)';
    genEl.classList.remove('placeholder');

    // Badges
    document.getElementById('match-row').style.display = 'flex';
    const eb = document.getElementById('exec-badge');
    const xb = document.getElementById('exact-badge');
    eb.className = 'badge ' + (data.exec_match ? 'badge-pass' : 'badge-fail');
    eb.textContent = data.exec_match ? '✓ Execution match' : '✗ Execution mismatch';
    xb.className = 'badge ' + (data.exact_match ? 'badge-pass' : 'badge-neutral');
    xb.textContent = data.exact_match ? '✓ Exact match' : '≈ Different syntax';

    // Results
    document.getElementById('results-grid').style.display = 'grid';
    document.getElementById('gen-results').innerHTML  = renderTable(data.gen_columns,  data.gen_rows,  data.gen_error);
    document.getElementById('gold-results').innerHTML = renderTable(data.gold_columns, data.gold_rows, data.gold_error);

    // Trace
    const traceBar = document.getElementById('trace-bar');
    traceBar.style.display = 'flex';
    const timings = data.timings || {};
    const total = Object.values(timings).reduce((a,b)=>a+b,0);
    traceBar.innerHTML = `
      <div class="trace-item">Total <span>${(total*1000).toFixed(0)} ms</span></div>
      ${Object.entries(timings).map(([k,v])=>`<div class="trace-item">${k} <span>${(v*1000).toFixed(0)} ms</span></div>`).join('')}
      <div class="trace-item">Tokens <span>${data.token_usage?.a1??'—'}</span></div>
      <div class="trace-item">Retries <span>${data.retries}</span></div>`;

  } finally {
    loading.classList.remove('active');
    btn.disabled = false; btn.textContent = '▶ Run Pipeline';
  }
}

// ── Render steps ──────────────────────────────────────────────────────────────
function renderSteps(steps) {
  const panel = document.getElementById('steps-panel');
  const header = panel.querySelector('.steps-header');
  panel.innerHTML = '';
  panel.appendChild(header);

  steps.forEach(step => {
    const div = document.createElement('div');
    div.className = 'step';
    div.innerHTML = `
      <div class="step-header" onclick="toggleStep(this)">
        <div class="step-icon ${step.status}">${step.status==='pass'?'✓':step.status==='fail'?'✗':'·'}</div>
        <div class="step-label">${esc(step.label)}</div>
        <div class="step-summary">${esc(step.detail.summary||'')}</div>
        <div class="step-ms">${step.ms} ms</div>
        <div class="step-arrow">›</div>
      </div>
      <div class="step-body">${renderStepBody(step)}</div>`;
    panel.appendChild(div);
  });
}

function toggleStep(header) {
  const step = header.closest('.step');
  step.classList.toggle('open');
}

function io(inputObj, outputObj) {
  return `
    <div class="io-section">
      <div class="io-label input">Input</div>
      <div class="io-block"><pre class="io-pre">${esc(JSON.stringify(inputObj, null, 2))}</pre></div>
    </div>
    <div class="io-section">
      <div class="io-label output">Output</div>
      <div class="io-block"><pre class="io-pre">${esc(JSON.stringify(outputObj, null, 2))}</pre></div>
    </div>`;
}

function renderStepBody(step) {
  const d = step.detail;
  const inp = d.input  || {};
  const out = d.output || {};

  if (d.error && !d.input) {
    return `<div class="io-section"><div class="error-msg">${esc(d.error)}</div></div>`;
  }

  return io(inp, out);
}

// ── Result table ──────────────────────────────────────────────────────────────
function renderTable(cols, rows, err) {
  if (err) return `<div class="error-msg">${esc(err)}</div>`;
  if (!cols?.length) return `<div class="no-rows">No results</div>`;
  const header = cols.map(c=>`<th>${esc(String(c))}</th>`).join('');
  const body = rows.map(row=>`<tr>${row.map(cell=>`<td>${esc(cell===null?'NULL':String(cell))}</td>`).join('')}</tr>`).join('');
  return `<div class="results-table-wrap"><table><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table></div>
    <div style="padding:6px 12px;font-size:11px;color:#475569">${rows.length} row${rows.length!==1?'s':''}</div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Custom query ──────────────────────────────────────────────────────────────
async function runCustom() {
  const db_id    = customDbSelect.value;
  const question = document.getElementById('custom-question').value.trim();

  if (!db_id)    { alert('Please select a database.'); return; }
  if (!question) { alert('Please enter a question.'); return; }

  const btn = document.getElementById('custom-run-btn');
  btn.disabled = true; btn.textContent = '⏳ Running…';
  loading.classList.add('active');
  document.getElementById('loading-text').textContent = 'Running pipeline…';

  // Reset output sections
  document.getElementById('custom-steps-panel').style.display = 'none';
  document.getElementById('custom-sql-section').style.display = 'none';
  document.getElementById('custom-results-section').style.display = 'none';
  document.getElementById('custom-trace-bar').style.display = 'none';

  try {
    const resp = await fetch('/api/run', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ db_id, question, gold_sql: '' }),
    });
    const data = await resp.json();

    if (data.error && !data.steps) {
      alert('Pipeline error: ' + data.error);
      return;
    }

    modelBadge.textContent = data.model || '—';

    // Steps
    const stepsPanel = document.getElementById('custom-steps-panel');
    stepsPanel.style.display = 'block';
    const stepsBody = document.getElementById('custom-steps-body');
    stepsBody.innerHTML = '';
    (data.steps || []).forEach(step => {
      const div = document.createElement('div');
      div.className = 'step';
      div.innerHTML = `
        <div class="step-header" onclick="toggleStep(this)">
          <div class="step-icon ${step.status}">${step.status==='pass'?'✓':step.status==='fail'?'✗':'·'}</div>
          <div class="step-label">${esc(step.label)}</div>
          <div class="step-summary">${esc(step.detail.summary||'')}</div>
          <div class="step-ms">${step.ms} ms</div>
          <div class="step-arrow">›</div>
        </div>
        <div class="step-body">${renderStepBody(step)}</div>`;
      stepsBody.appendChild(div);
    });

    // Generated SQL
    const genSql = data.generated_sql || '';
    document.getElementById('custom-sql-section').style.display = 'block';
    document.getElementById('custom-gen-sql').textContent = genSql || '(no SQL generated)';

    // Results
    document.getElementById('custom-results-section').style.display = 'block';
    document.getElementById('custom-results').innerHTML = renderTable(
      data.gen_columns, data.gen_rows, data.gen_error
    );

    // Trace
    const traceBar = document.getElementById('custom-trace-bar');
    traceBar.style.display = 'flex';
    const timings = data.timings || {};
    const total = Object.values(timings).reduce((a,b)=>a+b,0);
    traceBar.innerHTML = `
      <div class="trace-item">Total <span>${(total*1000).toFixed(0)} ms</span></div>
      ${Object.entries(timings).map(([k,v])=>`<div class="trace-item">${k} <span>${(v*1000).toFixed(0)} ms</span></div>`).join('')}
      <div class="trace-item">Tokens <span>${data.token_usage?.a1??'—'}</span></div>
      <div class="trace-item">Retries <span>${data.retries}</span></div>`;

  } finally {
    loading.classList.remove('active');
    btn.disabled = false; btn.textContent = '▶ Run Pipeline';
  }
}
</script>
</body>
