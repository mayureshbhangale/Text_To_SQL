name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run ruff (fast linter)
        run: ruff check src/ tests/

      - name: Run pylint
        run: |
          pylint src/nl_to_sql \
            --output-format=text \
            --score=yes \
            --fail-under=8.0

      - name: Run mypy (type check)
        run: mypy src/nl_to_sql

  test:
    name: Tests + coverage
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: |
          pytest tests/unit/ \
            --cov=nl_to_sql \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Coverage summary (percentage)
        run: |
          python - <<'EOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse("coverage.xml")
          root = tree.getroot()
          line_rate = float(root.attrib.get("line-rate", 0))
          pct = round(line_rate * 100, 1)
          print(f"\n{'='*40}")
          print(f"  Code coverage: {pct}%")
          print(f"{'='*40}\n")
          if pct < 80:
              raise SystemExit(f"Coverage {pct}% is below the 80% threshold")
          EOF

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: test
    # Integration tests need a real DB — skip on forks for safety
    if: github.event.pull_request.head.repo.full_name == github.repository
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run integration tests
        env:
          TEST_DB_URL: postgresql://testuser:testpass@localhost:5432/testdb
        run: pytest tests/integration/ -v
